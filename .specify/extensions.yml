installed: []
settings:
  auto_execute_hooks: true
hooks:
  after_implement:
  - extension: verify
    command: speckit.verify.run
    enabled: true
    optional: true
    prompt: Run verify to validate implementation against specification?
    description: Post-implementation verification gate
    condition: null
  - extension: sync
    command: speckit.sync.analyze
    enabled: true
    optional: true
    prompt: Check for spec drift after implementation?
    description: ''
    condition: null
  - extension: review
    command: speckit.review.run
    enabled: true
    optional: true
    prompt: Run PR review on implemented changes?
    description: Comprehensive review after implementation
    condition: null
